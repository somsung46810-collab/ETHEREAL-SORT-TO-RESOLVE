<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ETHEREAL SORT TO RESOLVE - MVP Simulation</title>
  <style>
    body { margin: 0; overflow: hidden; background: #030712; color: white; font-family: monospace; }
    #overlay { position: absolute; top: 12px; left: 12px; padding: 12px; background: rgba(0,0,0,0.68); border: 1px solid #38bdf8; color: #bae6fd; font-size: 13px; max-width: 440px; line-height: 1.45; z-index: 10; }
    #badge { position: absolute; right: 12px; bottom: 12px; padding: 10px 12px; border: 1px solid #22c55e; background: rgba(0,0,0,0.58); color: #bbf7d0; font-size: 12px; z-index: 10; }
  </style>
</head>
<body>
  <div id="overlay"><strong>ETHEREAL SORT MVP DEBUG</strong><br />RESOLVE = ETHEREAL SORT;<br />Status: initializing safe simulation...</div>
  <div id="badge">No destructive ops · safe clip-space render</div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x030712);

    const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(8, 7, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const overlay = document.getElementById("overlay");

    scene.add(new THREE.AmbientLight(0x88ccff, 0.5));
    const light = new THREE.DirectionalLight(0xffffff, 1.4);
    light.position.set(5, 10, 5);
    scene.add(light);

    // MAP LAYER: blue wireframe scene shell and route grid
    const grid = new THREE.GridHelper(44, 44, 0x00aaff, 0x004466);
    scene.add(grid);

    const road = new THREE.Mesh(
      new THREE.BoxGeometry(30, 0.05, 8),
      new THREE.MeshBasicMaterial({ color: 0x0077ff, wireframe: true })
    );
    road.position.y = 0.02;
    scene.add(road);

    const cityShell = new THREE.Group();
    for (let i = 0; i < 12; i++) {
      const h = 1 + Math.random() * 4;
      const block = new THREE.Mesh(
        new THREE.BoxGeometry(1.4, h, 1.4),
        new THREE.MeshBasicMaterial({ color: 0x155e75, wireframe: true })
      );
      block.position.set(-14 + i * 2.5, h / 2, i % 2 === 0 ? -7 : 7);
      cityShell.add(block);
    }
    scene.add(cityShell);

    // ASSET LAYER: fictional safe racing vehicles
    function createCar(color, x, z) {
      const group = new THREE.Group();
      const body = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.6, 1.1), new THREE.MeshStandardMaterial({ color }));
      body.position.y = 0.45;
      group.add(body);

      const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.45, 0.8), new THREE.MeshStandardMaterial({ color: 0x111827 }));
      cabin.position.set(0.1, 0.95, 0);
      group.add(cabin);

      const trail = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.08, 0.08), new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.35 }));
      trail.position.set(-1.9, 0.45, 0);
      group.add(trail);

      group.position.set(x, 0, z);
      scene.add(group);
      return group;
    }

    const carA = createCar(0x22d3ee, -10, -1.8);
    const carB = createCar(0xf97316, -12, 1.8);

    // SAFETY LAYER: red solid cubes for bounds and spawn validation
    function createSafetyCube(x, z, sx, sz) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(sx, 1.2, sz),
        new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.42 })
      );
      mesh.position.set(x, 0.6, z);
      scene.add(mesh);
      return mesh;
    }

    const safetyBounds = [
      createSafetyCube(-15, 0, 2, 8),
      createSafetyCube(15, 0, 2, 8),
      createSafetyCube(0, -5, 30, 1),
      createSafetyCube(0, 5, 30, 1)
    ];

    // TRANSFORM LAYER: green dashed rotated checkpoint cubes
    function createCheckpoint(x, z) {
      const edges = new THREE.EdgesGeometry(new THREE.BoxGeometry(1.4, 1.4, 1.4));
      const mat = new THREE.LineDashedMaterial({ color: 0x00ff66, dashSize: 0.25, gapSize: 0.15 });
      const line = new THREE.LineSegments(edges, mat);
      line.computeLineDistances();
      line.position.set(x, 1.0, z);
      line.rotation.y = Math.PI / 4;
      scene.add(line);
      return line;
    }

    const checkpoints = [-9, -3, 3, 9, 13].map(x => createCheckpoint(x, 0));

    class EtherealNode {
      constructor(name, object3D) {
        this.name = name;
        this.object3D = object3D;
        this.visible = true;
        this.safe = true;
        this.inClipSpace = false;
      }
      boolState() { return this.visible && this.safe && this.inClipSpace; }
    }

    class MVPResolver extends EtherealNode {
      constructor(name, object3D) {
        super(name, object3D);
        this.mvpMatrix = new THREE.Matrix4();
      }
      resolve(camera) {
        this.object3D.updateMatrixWorld();
        this.mvpMatrix.copy(camera.projectionMatrix).multiply(camera.matrixWorldInverse).multiply(this.object3D.matrixWorld);
        this.inClipSpace = true;
        return this.mvpMatrix;
      }
    }

    class EtherealSort {
      constructor() { this.nodes = []; }
      interlink(node) { this.nodes.push(node); }
      interject(sceneGraph) { return this.nodes.filter(node => sceneGraph.children.includes(node.object3D)); }
      interlock() { return this.nodes.every(node => node.safe); }
      resolve(camera) {
        return this.nodes.map(node => ({ name: node.name, mvp: node.resolve(camera), bool: node.boolState() }));
      }
    }

    const ETHEREAL_SORT = new EtherealSort();
    ETHEREAL_SORT.interlink(new MVPResolver("fictional-racer-alpha", carA));
    ETHEREAL_SORT.interlink(new MVPResolver("fictional-racer-beta", carB));
    ETHEREAL_SORT.interlink(new MVPResolver("city-wireframe-shell", cityShell));

    let t = 0;
    function animate() {
      requestAnimationFrame(animate);
      t += 0.016;

      carA.position.x = -12 + ((t * 3.0) % 26);
      carB.position.x = -13 + ((t * 2.55) % 26);
      carA.position.z = -1.8 + Math.sin(t * 2.0) * 0.25;
      carB.position.z = 1.8 + Math.cos(t * 2.0) * 0.25;
      carA.rotation.y = Math.sin(t * 1.5) * 0.08;
      carB.rotation.y = Math.cos(t * 1.5) * 0.08;
      cityShell.rotation.y = Math.sin(t * 0.12) * 0.04;

      checkpoints.forEach((checkpoint, i) => {
        checkpoint.rotation.y += 0.01 + i * 0.0015;
        checkpoint.rotation.x = Math.sin(t + i) * 0.2;
      });

      safetyBounds.forEach((bound, i) => {
        bound.scale.y = 1 + Math.sin(t * 1.5 + i) * 0.04;
      });

      const resolved = ETHEREAL_SORT.resolve(camera);
      const allSafe = resolved.every(item => item.bool) && ETHEREAL_SORT.interlock();

      overlay.innerHTML = `
        <strong>ETHEREAL SORT MVP DEBUG</strong><br />
        RESOLVE = ETHEREAL SORT;<br />
        Definition: runeword mandala → bool circuit → MVP class<br />
        Scene: safe fictional street-racing simulation<br />
        Objects resolved: ${resolved.length}<br />
        Clip-space: active<br />
        Safety bounds: red solid cubes<br />
        Transform checkpoints: green dashed rotated cubes<br />
        Stable frame state: ${allSafe}<br />
        Destructive ops: disabled
      `;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
